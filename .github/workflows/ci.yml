name: Python Docker CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ==========================================
  # JOB 1: LINTING & UNIT TESTING
  # ==========================================
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest Flask Werkzeug
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Linter (Flake8)
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 app.py test_app.py --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run Unit Tests (Pytest)
        run: |
          pytest test_app.py

  # ==========================================
  # JOB 2: BUILD & PUSH DOCKER IMAGE
  # ==========================================
  build-and-push:
    needs: lint-and-test # This job waits for the tests to pass!
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          # Pulling credentials securely from GitHub Secrets vault
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Tag the image with your Docker Hub username and project name
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/python-docker-msoptimization:latest